# Copy to config/profile.yaml and edit (gitignored). Onboarding copies this for you.
# First-run fields: docs/your-profile.md — run scripts/configure_profile.py to customize interactively.

owner: 'Your Name'

remote_preference: hybrid_home_metro  # fully_remote | hybrid_home_metro | any_us_remote

home_metro:
  name: Atlanta, GA
  zip_anchor: "30317"
  place_names:
    - atlanta
    - decatur
    - sandy springs
    - marietta
    - alpharetta
    - roswell
    - brookhaven
    - dunwoody
    - kirkwood
    - buckhead
    - midtown atlanta
    - east atlanta

# US cities that imply onsite when the JD is silent on remote — review at onboarding.
# Remove your home metro if local listings get filtered incorrectly.
silent_office_hubs:
  - philadelphia
  - chicago
  - boston
  - seattle
  - denver
  - austin
  - san francisco
  - new york
  - los angeles
  - dallas
  - houston
  - phoenix
  - portland
  - minneapolis
  - tampa
  - orlando
  - pittsburgh
  - irving
  - mountain view
  - sunnyvale
  - redmond
  - cambridge

comp:
  min_ceiling_usd: 130000
  min_floor_usd: 110000
  hourly_annual_floor_usd: 110000
  gate2_floor_usd: 145000

prescreen:
  stack_keywords:
    - playwright
    - python
    - pytest
    - typescript
    - javascript
    - github actions
    - ci/cd
    - cicd
    - rest api
    - graphql
    - selenium
    - docker
    - sql
    - golang
    - llm eval
    - llm evaluation
    - ai evaluation
    - model evaluation
    - test automation
    - api testing
    - e2e testing
  priority:
    max_years_high: 7
    max_years_mod: 8
    max_years_low: 8

# optional — see docs/ils-matrix.md
ils:
  cold_floor: 45
  referral_warm_delta: -10
  referral_strong_delta: -20
  matrix_file: config/ils_matrix.yaml
  company_overrides_file: config/company_ils_overrides.json

# optional — see docs/ils-matrix.md
referrals:
  status_file: applications/referral_status.txt

paths:
  skip_companies: applications/skip_companies.txt
  application_index: applications/application_index.html
  results_dir: jobspy/results
  ops_rollup_dir: jobspy/results/ops_rollups

# optional — see docs/your-profile.md (Later section) and README
verified_remote_employers: []

# optional — see docs/your-profile.md (Later section)
review_companies:
  - crowdstrike
  - ifit solutions

# Tracks: A=general QA, B=automation, C=contract, G=Google, R=Remotive, GH/L/AS=ATS boards
tracks:
  enable: [A, B]
