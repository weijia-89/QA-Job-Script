# Copy to config/profile.yaml and edit (gitignored).
# Onboarding: ./scripts/onboard.sh copies this file automatically.
# Validate: python3 -c "from jobspy.profile_loader import get_profile; get_profile()"

# Label in scrape logs / triage output (any string — not sent anywhere).
# Example: owner: jordan-qa
owner: your-name

# How strictly to filter work arrangement (US-focused pipeline).
#
#   fully_remote        — keep rows with clear US-remote language in the JD
#   hybrid_home_metro   — US-remote OR hybrid/onsite only in home_metro.place_names
#   any_us_remote       — broadest US filter; still blocks intl location column
#
# Example for a remote-first searcher:
#   remote_preference: fully_remote
remote_preference: hybrid_home_metro

# Cities you would commute to for hybrid days. Matched as substrings in JD + location column.
# zip_anchor is documentation for you (not used in geodesic math — matching is text/heuristic).
#
# Example (Portland-area hybrid):
#   home_metro:
#     name: Portland metro
#     zip_anchor: "97209"
#     place_names:
#       - portland
#       - beaverton
#       - hillsboro
home_metro:
  name: Your Metro Area
  zip_anchor: "00000"
  place_names:
    - Your City
    - Nearby suburb
    # Add every city/neighborhood you would commute to for hybrid days

# When the JD is silent on remote but the location column names a non-home hub
# (and does not say "Remote"), drop the row (hybrid_home_metro mode only).
# Use lowercase place/city names; matching is substring-based.
silent_office_hubs:
  - philadelphia
  - chicago
  - boston
  - seattle
  - denver
  - austin
  - san francisco
  - new york
  - los angeles
  - dallas
  - houston
  - phoenix
  - portland
  - minneapolis
  - tampa
  - orlando
  - pittsburgh
  - irving
  - mountain view
  - sunnyvale
  - redmond
  - cambridge

# Compensation gates (USD, annualized unless noted).
#
# Scraper L1 (comp_ok): pass if max >= min_ceiling_usd OR min >= min_floor_usd.
# Hourly postings: annualized at 2080 hrs/yr vs hourly_annual_floor_usd.
# Prescreen gate2_at_floor: PASS/MARGINAL/FAIL on salary extracted from JD text.
#
# Example (senior IC QA, US remote/hybrid):
#   comp:
#     min_ceiling_usd: 140000
#     min_floor_usd: 120000
#     hourly_annual_floor_usd: 120000
#     gate2_floor_usd: 150000
comp:
  min_ceiling_usd: 130000
  min_floor_usd: 110000
  hourly_annual_floor_usd: 110000
  gate2_floor_usd: 145000
  # Optional manual-offer tiers after triage (not used by scraper):
  # tier_floors:
  #   "5": 145000
  #   "7": 150000

prescreen:
  # Words counted in stack_hits column (JD description scan). Use lowercase phrases.
  # GH-track rows often have no description → stack_hits stays 0.
  stack_keywords:
    - playwright
    - python
    - pytest
    - typescript
    - javascript
    - github actions
    - ci/cd
    - cicd
    - rest api
    - graphql
    - selenium
    - docker
    - sql
    - golang
    - llm eval
    - llm evaluation
    - ai evaluation
    - model evaluation
    - test automation
    - api testing
    - e2e testing
  # priority column: HIGH / MOD / LOW / ? — rough flag from years-in-title regex.
  # max_years_* caps map to priority tiers (not an ILS score).
  priority:
    max_years_high: 7
    max_years_mod: 8
    max_years_low: 8

# Interview Likelihood Score (ILS) estimate settings for triage post-gates.
# matrix_file: JD-derived D1–D5 formula — see docs/ils-matrix.md
# company_overrides_file: optional per-employer overrides (copy from .example.json)
ils:
  cold_floor: 45
  referral_warm_delta: -10
  referral_strong_delta: -20
  matrix_file: config/ils_matrix.yaml
  company_overrides_file: config/company_ils_overrides.json

referrals:
  # One line per company: company_substring,cold|warm|strong
  # Example line: acme corp,warm
  status_file: applications/referral_status.txt

paths:
  skip_companies: applications/skip_companies.txt
  # Optional: HTML table of companies you already applied to (auto-skip merge).
  # Omit this key for default applications/application_index.html, or leave file missing
  # (parser returns empty set). See docs/installation.md § Application index.
  application_index: applications/application_index.html
  results_dir: jobspy/results
  ops_rollup_dir: jobspy/results/ops_rollups

# Employers you verified as US-remote despite weak LinkedIn JD copy (post-gates bypass).
# Example: verified_remote_employers: [example-corp]
verified_remote_employers: []

# Pass post-gates but triage_verdict=review (employer needs manual tier check).
review_companies:
  - crowdstrike
  - ifit solutions

# Scrape tracks to enable (subset of board/query bundles in run_search_locally.py).
#   A  — general QA/SDET Indeed + LinkedIn style queries
#   B  — automation-focused
#   C  — contract / staff-aug patterns
#   G  — Google Jobs
#   R  — Remotive
#   GH — Greenhouse company list (config/ats_companies_gh.example.txt)
#   L  — Lever (config/ats_companies_lever.example.txt)
#   AS — Ashby (config/ats_companies_ashby.example.txt)
#
# Minimal first run: enable: [A]
# Example full board sweep: enable: [A, B, C, G, R, GH, L, AS]
tracks:
  enable: [A, B, C, G, R, GH, L, AS]
